<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhilash Sudevan | Pro Code Studio</title>
    <style>
        :root {
            --primary: #d63384;
            --bg: #0d1117;
            --panel: #161b22;
            --text: #c9d1d9;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }

        .header { 
            background: var(--panel); 
            padding: 15px; 
            text-align: center; 
            border-bottom: 2px solid var(--primary);
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            color: white;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            padding: 10px;
            gap: 10px;
        }

        .editor-header {
            background: #21262d;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 5px 5px 0 0;
            border: 1px solid #30363d;
            color: var(--primary);
            font-weight: bold;
        }

        textarea { 
            flex: 1; 
            background: #010409; 
            color: #79c0ff; 
            border: 1px solid #30363d; 
            border-top: none;
            border-radius: 0 0 5px 5px; 
            padding: 15px; 
            font-family: 'Consolas', 'Monaco', monospace; 
            font-size: 15px;
            resize: none;
            outline: none;
            line-height: 1.6;
        }

        .preview-header {
            background: #27ae60;
            color: white;
            padding: 8px 15px;
            font-size: 13px;
            border-radius: 5px 5px 0 0;
            margin-top: 10px;
        }

        iframe { 
            flex: 1; 
            background: white; 
            border: 2px solid #30363d; 
            border-radius: 0 0 5px 5px;
        }

        /* Desktop View: Side-by-Side */
        @media (min-width: 768px) {
            .container { flex-direction: row; }
            .editor-box, .preview-box { flex: 1; display: flex; flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="header">ABHILASH SUDEVAN PRO STUDIO</div>

<div class="container">
    <div class="editor-box">
        <div class="editor-header">EDITOR (HTML + CSS + JS)</div>
        <textarea id="fullCode" placeholder="Type your full code here..." oninput="update()">

  <p>Start coding everything in this single box!</p>

</html>
        </textarea>
    </div>

    <div class="preview-box">
        <div class="preview-header">LIVE PREVIEW</div>
        <iframe id="output"></iframe>
    </div>
</div>

<script>
    function update() {
        const code = document.getElementById("fullCode").value;
        const output = document.getElementById("output").contentWindow.document;

        output.open();
        output.write(code);
        output.close();
    }
    // Load default code on start
    window.onload = update;
</script>

</body>
</html>
