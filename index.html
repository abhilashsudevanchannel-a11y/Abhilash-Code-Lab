<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Abhilash Sudevan | Pro Code Studio</title>
    <style>
        :root {
            --primary: #d63384;
            --bg: #0d1117;
            --panel: #161b22;
            --text: #c9d1d9;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            background: var(--bg); 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
            overflow: hidden;
        }

        .header { 
            background: var(--panel); 
            padding: 10px; 
            text-align: center; 
            border-bottom: 2px solid var(--primary);
            color: white;
            font-size: 16px;
            font-weight: bold;
        }

        .container { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            padding: 5px;
            overflow-y: auto;
        }

        .section-label {
            background: #21262d;
            padding: 8px;
            font-size: 12px;
            color: var(--primary);
            font-weight: bold;
            border: 1px solid #30363d;
            border-radius: 5px 5px 0 0;
            display: flex;
            justify-content: space-between;
        }

        textarea { 
            width: 100%;
            height: 300px; /* മൊബൈലിൽ കൂടുതൽ സ്ഥലം ലഭിക്കാൻ */
            background: #010409; 
            color: #79c0ff; 
            border: 1px solid #30363d; 
            border-radius: 0 0 5px 5px;
            padding: 10px; 
            font-family: 'Consolas', monospace; 
            font-size: 14px;
            resize: vertical;
            outline: none;
            box-sizing: border-box;
        }

        .preview-label {
            background: #27ae60;
            color: white;
            padding: 8px;
            font-size: 12px;
            margin-top: 10px;
            border-radius: 5px 5px 0 0;
        }

        iframe { 
            width: 100%;
            height: 300px;
            background: white; 
            border: 1px solid #30363d; 
            border-radius: 0 0 5px 5px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="header">ABHILASH PRO STUDIO</div>

<div class="container">
    <div class="section-label">EDITOR (WRITE CODE HERE)</div>
    <textarea id="fullCode" oninput="update()" spellcheck="false"><!DOCTYPE html>
<html>
<head>
<style>
  body { text-align: center; }
  h1 { color: #d63384; }
</style>
</head>
<body>
  <h1>Hello Abhilash!</h1>
  <p>Start coding here.</p>
</body>
</html></textarea>

    <div class="preview-label">LIVE PREVIEW</div>
    <iframe id="output"></iframe>
</div>

<script>
    function update() {
        const code = document.getElementById("fullCode").value;
        const output = document.getElementById("output").contentWindow.document;
        output.open();
        output.write(code);
        output.close();
    }
    window.onload = update;
</script>

</body>
</html>
