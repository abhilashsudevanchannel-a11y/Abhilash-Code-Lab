<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abhilash Code Lab</title>
    <style>
        body { font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; color: white; }
        .header { background: #d63384; padding: 15px; text-align: center; font-weight: bold; }
        .main { display: flex; flex: 1; flex-direction: column; }
        textarea { width: 100%; height: 150px; background: #252526; color: #9cdcfe; border: 1px solid #444; padding: 10px; font-family: monospace; box-sizing: border-box; }
        iframe { width: 100%; flex: 1; background: white; border: none; }
        .label { padding: 5px 10px; background: #333; font-size: 12px; color: #aaa; }
    </style>
</head>
<body>
    <div class="header">ABHILASH CODE LAB</div>
    <div class="main">
        <div class="label">HTML / CSS / JS CODE HERE:</div>
        <textarea id="code" placeholder="<h1>Hello World</h1>" oninput="run()"></textarea>
        <div class="label" style="background: #27ae60; color: white;">LIVE RESULT:</div>
        <iframe id="output"></iframe>
    </div>
    <script>
        function run() {
            const code = document.getElementById("code").value;
            const output = document.getElementById("output").contentWindow.document;
            output.open();
            output.write(code);
            output.close();
        }
    </script>
</body>
</html>
